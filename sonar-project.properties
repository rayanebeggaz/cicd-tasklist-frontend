# SonarQube configuration - TaskList Frontend
sonar.projectKey=tasklist-frontend
sonar.projectName=TaskList Frontend
sonar.projectVersion=1.0

# Source and test layout
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.{ts,tsx}

# Exclude generated / non-source files from analysis
sonar.exclusions=src/__tests__/**,dist/**,node_modules/**,coverage/**

# Test coverage report (produced by Vitest / v8)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/__tests__/**,src/main.tsx

sonar.sourceEncoding=UTF-8
